<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDF Scanner — Azuria REM</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .scanner-wrap {
      min-height: calc(100vh - 80px);
      display: flex;
      flex-direction: column;
    }
    .scanner-frame {
      flex: 1;
      width: 100%;
      border: none;
      min-height: 80vh;
      background: var(--cream, #14161a);
    }
    .scanner-denied {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
    }
    .scanner-denied__inner {
      max-width: 400px;
    }
    .scanner-denied__inner h2 {
      color: var(--silver-bright, #e0e8f0);
      margin-bottom: 1rem;
    }
    .scanner-denied__inner p {
      color: var(--silver-dim, rgba(160,170,185,.4));
      margin-bottom: 2rem;
    }
    .scanner-logout {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 100;
      padding: 8px 16px;
      background: rgba(176,141,142,.15);
      color: var(--silver, rgba(200,210,225,.7));
      border: 1px solid rgba(200,210,225,.12);
      border-radius: 6px;
      font-family: 'Archivo', sans-serif;
      font-size: .8rem;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all .2s;
    }
    .scanner-logout:hover {
      background: rgba(176,141,142,.25);
      color: #fff;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar__logo"><img src="img/logo.webp" alt="Azuria REM" width="208" height="65"></a>
      <div class="hamburger" aria-label="Menu"><span></span><span></span><span></span></div>
      <div class="navbar__links">
        <a href="index.html" class="nav-home" aria-label="Accueil"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a>
        <a href="services.html">Services &amp; Réalisations</a>
        <a href="about.html">À propos</a>
        <a href="contact.html">Contact</a>
        <a href="#" class="nav-login" onclick="return false">Espace Partenaires</a>
      </div>
    </div>
  </nav>

  <div class="scanner-wrap" id="scanner-wrap">
    <!-- Denied state (shown if not admin) -->
    <div class="scanner-denied" id="scanner-denied">
      <div class="scanner-denied__inner blur-fade">
        <h2>Accès restreint</h2>
        <p>Cette section est réservée à l'équipe d'administration.</p>
        <a href="index.html" class="shimmer-btn">
          <span class="shimmer-spark"></span>
          Retour à l'accueil
          <span class="shimmer-highlight"></span>
        </a>
      </div>
    </div>
  </div>

  <button class="scanner-logout" id="scanner-logout" style="display:none" onclick="sessionStorage.removeItem('azuria_session');window.location.href='index.html'">
    Déconnexion
  </button>

  <!-- Login Modal -->
  <div class="login-overlay" id="login-overlay">
    <div class="login-modal">
      <button class="login-modal__close">&times;</button>
      <h3>Espace Partenaires</h3>
      <p>Accès réservé aux investisseurs et affiliés du réseau Azuria REM.</p>
      <form>
        <div class="form-group">
          <label for="login-email">Identifiant</label>
          <input type="text" id="login-email" placeholder="Identifiant" required>
        </div>
        <div class="form-group">
          <label for="login-pass">Mot de passe</label>
          <input type="password" id="login-pass" placeholder="Mot de passe" required>
        </div>
        <div class="login-modal__actions">
          <button type="submit" class="login-modal__btn">Se connecter</button>
          <p class="login-modal__link">Pas encore partenaire ? <a href="contact.html">Demander l'accès</a></p>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // Scanner page auth check
    (() => {
      const SCANNER_URL = 'https://web-production-fd1b3.up.railway.app';
      const SCANNER_TOKEN = 'azuria-rem-2026';
      const session = sessionStorage.getItem('azuria_session');
      let isAdmin = false;
      try {
        const s = JSON.parse(session);
        isAdmin = s && s.role === 'admin';
      } catch(e) {}

      if (isAdmin) {
        document.getElementById('scanner-denied').style.display = 'none';
        document.getElementById('scanner-logout').style.display = 'block';
        const iframe = document.createElement('iframe');
        iframe.className = 'scanner-frame';
        iframe.src = SCANNER_URL + '/?token=' + SCANNER_TOKEN;
        iframe.setAttribute('loading', 'lazy');
        document.getElementById('scanner-wrap').appendChild(iframe);
      }
    })();
  </script>
</body>
</html>
