<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDF Scanner — Azuria REM</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { margin: 0; overflow: hidden; background: #d9d5ce; }
    .scanner-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 48px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      background: #1a1f2e; border-bottom: 1px solid rgba(200,210,225,.12);
      font-family: 'Archivo', sans-serif;
    }
    .scanner-bar__left { display: flex; align-items: center; gap: 14px; }
    .scanner-bar__left a {
      color: rgba(200,210,225,.5); text-decoration: none; font-size: .8rem;
      display: flex; align-items: center; gap: 6px; transition: color .2s;
    }
    .scanner-bar__left a:hover { color: #fff; }
    .scanner-bar__title {
      color: rgba(200,210,225,.85); font-size: .85rem; font-weight: 600;
      letter-spacing: .03em;
    }
    .scanner-bar__right a {
      color: rgba(200,210,225,.4); text-decoration: none; font-size: .75rem;
      padding: 5px 12px; border: 1px solid rgba(200,210,225,.12); border-radius: 5px;
      transition: all .2s;
    }
    .scanner-bar__right a:hover { color: #fff; border-color: rgba(200,210,225,.3); }
    .scanner-wrap {
      position: fixed; top: 48px; left: 0; right: 0; bottom: 0;
      display: flex; flex-direction: column;
    }
    .scanner-frame {
      flex: 1; width: 100%; border: none; background: #d9d5ce;
    }
    .scanner-denied {
      flex: 1; display: flex; align-items: center; justify-content: center;
      text-align: center; background: #060f1e;
    }
    .scanner-denied__inner { max-width: 400px; }
    .scanner-denied__inner h2 { color: #e0e8f0; margin-bottom: 1rem; }
    .scanner-denied__inner p { color: rgba(160,170,185,.4); margin-bottom: 2rem; }
  </style>
</head>
<body>

  <div class="scanner-bar" id="scanner-bar" style="display:none">
    <div class="scanner-bar__left">
      <a href="index.html"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg> Azuria</a>
      <span class="scanner-bar__title">IDF Scanner</span>
    </div>
    <div class="scanner-bar__right">
      <a href="#" onclick="sessionStorage.removeItem('azuria_session');window.location.href='index.html';return false">Déconnexion</a>
    </div>
  </div>

  <div class="scanner-wrap" id="scanner-wrap">
    <div class="scanner-denied" id="scanner-denied">
      <div class="scanner-denied__inner blur-fade">
        <h2>Accès restreint</h2>
        <p>Cette section est réservée à l'équipe d'administration.</p>
        <a href="index.html" class="shimmer-btn">
          <span class="shimmer-spark"></span>
          Retour à l'accueil
          <span class="shimmer-highlight"></span>
        </a>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const SCANNER_URL = 'https://web-production-fd1b3.up.railway.app';
      const SCANNER_TOKEN = 'azuria-rem-2026';
      const session = sessionStorage.getItem('azuria_session');
      let isAdmin = false;
      try {
        const s = JSON.parse(session);
        isAdmin = s && s.role === 'admin';
      } catch(e) {}

      if (isAdmin) {
        document.getElementById('scanner-bar').style.display = 'flex';
        document.getElementById('scanner-denied').style.display = 'none';
        const iframe = document.createElement('iframe');
        iframe.className = 'scanner-frame';
        iframe.src = SCANNER_URL + '/?token=' + SCANNER_TOKEN + '&embed=1';
        document.getElementById('scanner-wrap').appendChild(iframe);
      }
    })();
  </script>
</body>
</html>
